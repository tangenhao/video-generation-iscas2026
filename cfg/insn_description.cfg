[synchronize_indie]
insn_opcode = Insn_opcode `5'00000` for synchronize instruction.
sync_insns = Sync_insns `2'b00` for synchronize_indie instruction.
valid_insn_number = The number of valid instruction synchronize words in this instruction.
sync_word_0 = Sync word 0
sync_word_1 = Sync word 1
sync_word_2 = Sync word 2
sync_word_3 = Sync word 3
sync_word_4 = Sync word 4
sync_word_5 = Sync word 5
load_highaddr_config = Load high address configuration, `1` - Use last synchronze_cross instruction configed high address, `0` - Use local high address configuration.
store_highaddr_config = Store high address configuration, `1` - Use last synchronze_cross instruction configed high address, `0` - Use local high address configuration.


[synchronize_iteration]
insn_opcode = Insn_opcode `5'00000` for synchronize instruction.
sync_insns = Sync_insns `2'b01` for synchronize_iteration instruction.
next_word = The number of words to be iterated.
iteration_times = The number of iteration times.
valid_insn_number = The number of valid instruction synchronize words in this instruction.
sync_word_0 = Sync word 0
sync_word_1 = Sync word 1
sync_word_2 = Sync word 2
sync_word_3 = Sync word 3
sync_word_4 = Sync word 4


[synchronize_cross]
insn_opcode = Insn_opcode `5'00000` for synchronize instruction.
sync_insns = Sync_insns `2'b10` for synchronize_cross instruction.
sync_word = Sync word
load_highaddr = Load high address
check_reg_value = Dependency register check value
store_highaddr = Store high address
set_reg_value = Dependency register set value


[load_master_execute_insn]
insn_opcode = Insn_opcode `5'00001` for load_master instruction.
insn_number = The number of execution times controled by a single synchronize word.
load_insns = Load_insns `2'b00` for load_master_execute instruction.
ddr_addr = 35-bits ddr address, 32GB
sequ_burst_0 = The number of bursts for load sequence iteration 0. <br> <b> true value is `seq_burst_0`+1 <br>
hop_offset_1_exp = The exponent of the hop offset for load sequence iteration 1.
hop_offset_1_fra = The fraction of the hop offset for load sequence iteration 1.
sequ_burst_1 = The number of bursts for load sequence iteration 1. <br> <b> true value is `seq_burst_1`+1 <br>
hop_offset_2_exp = The exponent of the hop offset for load sequence iteration 2.
hop_offset_2_fra = The fraction of the hop offset for load sequence iteration 2.
sequ_burst_2 = The number of bursts for load sequence iteration 2. <br> <b> true value is `seq_burst_2`+1 <br>
hop_offset_3_exp = The exponent of the hop offset for load sequence iteration 3.
hop_offset_3_fra = The fraction of the hop offset for load sequence iteration 3.
sequ_burst_3 = The number of bursts for load sequence iteration 3. <br> <b> true value is `seq_burst_3`+1 <br>
sram_addr = Destination SRAM address
all_done = All done flag


[store_master_execute_insn]
insn_opcode = Insn_opcode `5'00010` for store_master instruction.
insn_number = The number of execution times controled by a single synchronize word.
store_insns = Store_insns `2'b00` for store_master_execute instruction.
ddr_addr = 35-bits ddr address, 32GB
sequ_burst_0 = The number of bursts for store sequence iteration 0. <br> <b> true value is `seq_burst_0`+1 <br>
hop_offset_1_exp = The exponent of the hop offset for store sequence iteration 1.
hop_offset_1_fra = The fraction of the hop offset for store sequence iteration 1.
sequ_burst_1 = The number of bursts for store sequence iteration 1. <br> <b> true value is `seq_burst_1`+1 <br>
hop_offset_2_exp = The exponent of the hop offset for store sequence iteration 2.
hop_offset_2_fra = The fraction of the hop offset for store sequence iteration 2.
sequ_burst_2 = The number of bursts for store sequence iteration 2. <br> <b> true value is `seq_burst_2`+1 <br>
hop_offset_3_exp = The exponent of the hop offset for store sequence iteration 3.
hop_offset_3_fra = The fraction of the hop offset for store sequence iteration 3.
sequ_burst_3 = The number of bursts for store sequence iteration 3. <br> <b> true value is `seq_burst_3`+1 <br>
sram_addr = Source SRAM address
all_done = All done flag


[pea_config_insn]
insn_opcode = Insn_opcode `5'00011` ~ `5'b01100` for pea instruction.
insn_number = The number of execution times controled by a single synchronize word.
insn_kind = 指令类型, <br> `000 - config` <br> `001 - convolution execute`<br> `010 - gemm execute`<br> `011 - transposed convlution execute`
sparse_base = 稀疏基底, <br>`00 - 2`<br> `01 - 4`<br> `10 - 8`<br> `11 - 16`. 
sparse_ratio = 稀疏比率, <br>`00 - 1(no sparse)`<br> `01 - 2`<br> `10 - 4`<br> `11 - 8`.
non_uniform_quantization = 非均匀量化, <br>`0 - disable`<br> `1 - enable`.
outlier_enable = 异常值检测, <br>`0 - disable`<br> `1 - enable`.
expand_weight_sram = 拓展weight SRAM深度, <br>`0 - disable`<br> `1 - enable`.
ifmap_sram_base_highaddr = ifmap SRAM基地址高位<br><b>不包含ping-pong位.
weight_sram_base_highaddr = weight SRAM 基地址高位<br><b>不包含ping-pong位.
psum_sram_base_highaddr = psum SRAM 基地址高位<br><b>不包含ping-pong位.
stride_width = 卷积宽度方向步长
stride_height = 卷积高度方向步长
dilation_width = 卷积宽度方向膨胀率
dilation_height = 卷积高度方向膨胀率


[convlution_execute_insn]
insn_opcode = Insn_opcode `5'01101` ~ `5'b01111` for convolution execute instruction.
insn_number = The number of execution times controled by a single synchronize word.
insn_kind = 指令类型, <br> `000 - config` <br> `001 - convolution execute`<br> `010 - gemm execute`<br> `011 - transposed convlution execute`
type_a = 输入A的数据类型, <br>`000 - int4`<br> `001 - int8`<br>  `010 - fp16`<br> `011 - bf16`<br>`100 - int16`.
type_b = 输入B的数据类型, <br>`000 - int4`<br> `001 - int8`<br>  `010 - fp16`<br> `011 - bf16`<br>`100 - int16`.
type_accumulator = 累加数据类型, <br>`0 - int32`<br> `1 - fp32`.
type_output = 输出数据类型, <br>`00 - int32`<br> `01 - fp32`<br> `10 - int16`.
ifmap_width = 输入特征图宽度<br><b>为真实值` -1`
ifmap_height = 输入特征图高度<br><b>为真实值` -1`
weight_width = 输入卷积核宽度<br><b>为真实值` -1`
weight_height = 输入卷积核高度<br><b>为真实值` -1`
psum_width = 部分和宽度<br><b>为真实值` -1`
psum_height = 部分和高度<br><b>为真实值` -1`
ic_group = 输入通道组数<br><b>为真实值` -1`
oc_group = 输出通道组数<br><b>为真实值` -1`
ifmap_highaddr = ifmap SRAM Ping-Pong高位
weight_highaddr = weight SRAM Ping-Pong高位
psum_highaddr = psum SRAM Ping-Pong高位
pad_left = 左侧填充<br><b>为真实值
pad_top = 上侧填充<br><b>为真实值
psum_number = psum SRAM写入次数
psum_accumulated = 是否累加psum,<br> `0 - disable`<br> `1 - enable


[gemm_execute_insn]
insn_opcode = Insn_opcode `5'10000` ~ `5'b10010` for gemm execute instruction.
insn_number = The number of execution times controled by a single synchronize word.
insn_kind = 指令类型, <br> `000 - config` <br> `001 - convolution execute`<br> `010 - gemm execute`<br> `011 - transposed convlution execute`
type_a = 输入A的数据类型, <br>`000 - int4`<br> `001 - int8`<br>  `010 - fp16`<br> `011 - bf16`<br>`100 - int16`.
type_b = 输入B的数据类型, <br>`000 - int4`<br> `001 - int8`<br>  `010 - fp16`<br> `011 - bf16`<br>`100 - int16`.
type_accumulator = 累加数据类型, <br>`0 - int32`<br> `1 - fp32`.
type_output = 输出数据类型, <br>`00 - int32`<br> `01 - fp32`<br> `10 - int16`.
tile_m = 矩阵乘法tile m维度
n_groups = n方向分组数
k_groups = k方向分组数
ifmap_highaddr = ifmap SRAM Ping-Pong高位
weight_highaddr = weight SRAM Ping-Pong高位
psum_highaddr = psum SRAM Ping-Pong高位
psum_number = psum SRAM写入次数
psum_accumulated = 是否累加psum,<br> `0 - disable`<br> `1 - enable


[vcu_execute_insn]
insn_opcode = Insn_opcode `5'10011` ~ `5'b10100` for vcu execute instruction.
insn_number = The number of execution times controled by a single synchronize word.
insn_kind = 指令类型, <br> `01 - execute`
psum_data_type = psum输入数据类型标识, 判断来自psum的数据进行何种数据转换 <br>`000` - fp16<br> `001` - bf16 <br>`010` - int16<br>`011` - int32<br>`100` - fp32
resadd_para_type = resadd输入数据类型标识, 判断来自resadd的数据进行何种数据转换, <br>`000` - int4<br>`001` - int8<br>`010` - int16<br>`011` - fp32<br>`100` - fp16<br>`101` - bf16<br>
data_out_type = 输出数据类型，判断对结果进行何种类型转换, <br>`000` - int4<br>`001` - int8<br>`010` - int16<br>`011` - fp32<br>`100` - fp16<br>`101` - bf16<br>`111` - fp32
data_out_ram = 判断结果存入哪个寄存器, <br>`0` - psum<br>`1` - ofmap
opcode_number = opcode的数量
opcode_addr = opcode SRAM的起始地址
para_in_addr = psum_ram输入数据地址
resadd_in_addr = resadd_ram输入数据地址
ram_out_addr = 输出数据的ram地址
num_data_cnt = H × W
oc_group_cnt = oc_group
para_func_cnt = para_ram里存储的数据类型个数